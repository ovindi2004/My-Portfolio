<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Card Grid - My Assignment</title>
    <style>
        :root {
            --background-dark: #1b1f22;
            --spacing-s: 8px;
            --spacing-m: 16px;
            --spacing-l: 24px;
            --spacing-xl: 32px;
            --spacing-xxl: 64px;
            --text-light: rgba(255,255,255,0.75);
            --text-lighter: rgba(255,255,255,0.9);
            --width-container: 1200px;
        }

        * {
            border: 0;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
        }

        body {
            height: 100%;
        }

        .hero-section {
            align-items: center;
            background: var(--background-dark);
            display: flex;
            min-height: 100%;
            justify-content: center;
            padding: var(--spacing-xxl) var(--spacing-l);
            flex-direction: column; /* Added this */
        }

        .assignment-title {
            color: var(--text-lighter);
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: var(--spacing-xxl);
            text-align: center;
            text-shadow: 2px 2px 20px rgba(0,0,0,0.3);
            letter-spacing: 2px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            grid-column-gap: var(--spacing-l);
            grid-row-gap: var(--spacing-l);
            max-width: var(--width-container);
            width: 100%;
        }

        @media(min-width: 540px) {
            .card-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media(min-width: 960px) {
            .card-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .card {
            list-style: none;
            position: relative;
            text-decoration: none;
        }

        .card:before {
            content: '';
            display: block;
            padding-bottom: 150%;
            width: 100%;
        }

        .card__background {
            background-size: cover;
            background-position: center;
            border-radius: var(--spacing-l);
            bottom: 0;
            filter: brightness(0.75) saturate(1.2) contrast(0.85);
            left: 0;
            position: absolute;
            right: 0;
            top: 0;
            transform-origin: center;
            transform: scale(1) translateZ(0);
            transition: filter 200ms linear, transform 200ms linear;
        }

        .card:hover .card__background {
            transform: scale(1.05) translateZ(0);
        }

        .card-grid:hover > .card:not(:hover) .card__background {
            filter: brightness(0.5) saturate(0.5) contrast(1.2) blur(20px);
        }

        .card__content {
            left: 0;
            padding: var(--spacing-l);
            position: absolute;
            top: 0;
        }

        .card__category {
            color: var(--text-light);
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: var(--spacing-m);
            text-transform: uppercase;
        }

        .card__heading {
            color: var(--text-lighter);
            font-size: 1.8rem;
            text-shadow: 2px 2px 20px rgba(0,0,0,0.2);
            line-height: 1.2;
        }
    </style>
</head>
<body>

<section class="hero-section">

    <h1 class="assignment-title">MY ASSIGNMENT</h1>

    <div class="card-grid">

        <a class="card" href="https://github.com/OviBby/ITS1119-CSS-EX-3/tree/master/Case_1">
            <div class="card__background" style="background-image: url(1775308697176_image.png)"></div>
            <div class="card__content">
                <p class="card__category">Case 01</p>
                <h3 class="card__heading">Use only Absolute and Relative Position</h3>
            </div>
        </a>

        <a class="card" href="https://github.com/OviBby/Pharmacy-Management-System">
            <div class="card__background" style="background-image: url(1775308697176_image.png)"></div>
            <div class="card__content">
                <p class="card__category">Case 02</p>
                <h3 class="card__heading">Use Absolute,Relative and Box model</h3>
            </div>
        </a>

        <a class="card" href="#">
            <div class="card__background" style="background-image: url(1775308697176_image.png)"></div>
            <div class="card__content">
                <p class="card__category">Category 3</p>
                <h3 class="card__heading">Example Card Heading</h3>
            </div>
        </a>

        <a class="card" href="#">
            <div class="card__background" style="background-image: url(1775308697176_image.png)"></div>
            <div class="card__content">
                <p class="card__category">Category 4</p>
                <h3 class="card__heading">Example Card Heading</h3>
            </div>
        </a>

    </div>
</section>
</body>
</html>
