<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title> My Portfolio Web Design</title>
</head>
<body class="body-main" data-theme="dark" data-lang="en" data-dir="ltr">

<!-- Loading Screen -->
<div class="loader-screen" id="loader">
    <div class="loader-content">
        <div class="loader-code-text">
            <div class="code-line" data-line="1">const portfolio = {</div>
            <div class="code-line" data-line="2">  loading: true,</div>
            <div class="code-line" data-line="3">  status: 'initializing...'</div>
            <div class="code-line" data-line="4">};</div>
        </div>
        <div class="loader-spinner-wrapper">
            <div class="loader-spinner"></div>
        </div>
        <div class="loader-progress-wrapper">
            <div class="loader-progress-bar"></div>
        </div>
        <div class="loader-percentage" id="loaderPercent">0%</div>
    </div>
</div>

<!-- Navigation Header -->
<header class="main-header" id="header">
    <nav class="nav-container">
        <div class="nav-brand">
            <div class="brand-logo">
                <span class="logo-bracket">&lt;</span>
                <span class="logo-text">OVI</span>
                <span class="logo-bracket">/&gt;</span>
            </div>
        </div>

        <div class="nav-menu" id="navMenu">
            <a href="#home" class="nav-link active" data-section="home">
                <i class="fas fa-home"></i>
                <span class="nav-text" data-text-en="Home" data-text-ar="الرئيسية">Home</span>
            </a>
            <a href="#about" class="nav-link" data-section="about">
                <i class="fas fa-user"></i>
                <span class="nav-text" data-text-en="About" data-text-ar="عني">About</span>
            </a>
            <a href="#skills" class="nav-link" data-section="skills">
                <i class="fas fa-code"></i>
                <span class="nav-text" data-text-en="Skills" data-text-ar="المهارات">Skills</span>
            </a>
            <a href="#experience" class="nav-link" data-section="experience">
                <i class="fas fa-briefcase"></i>
                <span class="nav-text" data-text-en="Experience" data-text-ar="الخبرة">Experience</span>
            </a>
            <a href="#projects" class="nav-link" data-section="projects">
                <i class="fas fa-rocket"></i>
                <span class="nav-text" data-text-en="Projects" data-text-ar="المشاريع">Projects</span>
            </a>
            <a href="#contact" class="nav-link" data-section="contact">
                <i class="fas fa-envelope"></i>
                <span class="nav-text" data-text-en="Contact" data-text-ar="التواصل">Contact</span>
            </a>
        </div>

        <div class="nav-controls">
            <button class="lang-toggle" id="langToggle" title="Toggle Language">
                <i class="fas fa-language"></i>
                <span class="lang-text">AR</span>
            </button>
            <button class="theme-toggle" id="themeToggle" title="Toggle Theme">
                <i class="fas fa-moon"></i>
            </button>
            <button class="menu-toggle" id="menuToggle" title="Toggle Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>
</header>

<!-- Main Content -->
<main class="main-content">




</body>
</html>
